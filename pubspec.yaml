name: rep_foundry
description: RepFoundry - A simple, fast workout tracking app for gym-goers.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  fl_chart: ^0.67.0
  uuid: ^4.4.0
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  path_provider: ^2.1.5
  path: ^1.9.1
  sqlite3_flutter_libs: ^0.5.28
  audioplayers: ^6.1.0
  geolocator: ^13.0.2
  flutter_blue_plus: ^1.35.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/sounds/
