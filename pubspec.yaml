name: rep_foundry
description: RepFoundry - A simple, fast workout tracking app for gym-goers.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  fl_chart: ^1.1.1
  uuid: ^4.4.0
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  path: ^1.9.1
  audioplayers: ^6.1.0
  geolocator: ^14.0.2
  flutter_blue_plus: ^2.2.1
  share_plus: ^12.0.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  health: ^13.3.1
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  connectivity_plus: ^7.0.0
  http: ^1.2.2
  url_launcher: ^6.2.5
  package_info_plus: ^8.0.0
  google_fonts: ^6.2.1
  app_settings: ^5.1.1
  hr_zones: ^0.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  drift_dev: ^2.32.0
  build_runner: ^2.4.14

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/exercises/
